# marsClaw macOS pf (packet filter) anchor — egress enforcement.
#
# This is the REAL egress boundary on macOS (proxy env vars are only a hint
# that many libraries ignore). It drops all outbound traffic from the bot's
# dedicated user EXCEPT to the local egress gateway and DNS, forcing every
# connection through the SSRF-protected proxy at the socket layer.
#
# PREREQUISITE: the bot must run as its OWN user (not your login user), or these
# rules would also block your normal traffic. Create one, e.g. `_marsclaw`, and
# run the launchd service as that user. Replace the user below to match.
#
# Load via tools/sandbox/install-pf-anchor.sh (needs sudo). pf anchors do NOT
# survive reboot unless referenced from /etc/pf.conf — the install script
# documents making it persistent.
#
# After loading AND verifying (`sudo pfctl -a com.marsclaw -s rules`), set
# MARSCLAW_EGRESS_ENFORCED=1 in the bot's environment to relax the URL allowlist.

# Allow loopback to the egress gateway (default port 8775) and the LLM proxy
# (default 8765). Adjust ports if you overrode them.
pass out quick proto tcp from any to 127.0.0.1 port 8775 user _marsclaw
pass out quick proto tcp from any to 127.0.0.1 port 8765 user _marsclaw

# Allow DNS so hostnames can resolve (the gateway resolves + SSRF-checks; the
# bot still needs name resolution for the proxy CONNECT target host strings).
pass out quick proto { tcp udp } from any to any port 53 user _marsclaw

# Drop everything else this user tries to send outbound.
block drop out quick proto { tcp udp } from any to any user _marsclaw
